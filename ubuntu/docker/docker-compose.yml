version: '3.8'

services:
  foobar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xvim-test
    hostname: foobar

    volumes:
      # Mount offline packages for installation
      - ../offline:/opt/nvim-offline:ro

      # Workspace for testing
      - ./workspace:/home/testuser/workspace

    # Keep container running
    tty: true
    stdin_open: true

    # Optional: disable network for true offline testing
    # Uncomment the following line to simulate offline environment (after packages are downloaded)
    # network_mode: none

    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
